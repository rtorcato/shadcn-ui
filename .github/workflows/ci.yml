name: 🚀 CI/CD Pipeline

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]
    workflow_dispatch:

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

permissions:
    contents: write
    issues: write
    pull-requests: write
    id-token: write

jobs:
    check-skip:
        runs-on: ubuntu-latest
        outputs:
            should-skip: ${{ steps.skip-check.outputs.should-skip }}
        steps:
            - name: Check for skip CI
              id: skip-check
              env:
                  COMMIT_MSG: ${{ github.event.head_commit.message }}
              run: |
                  if [[ "$COMMIT_MSG" =~ \[(ci skip|skip ci)\] ]]; then
                    echo "should-skip=true" >> $GITHUB_OUTPUT
                  else
                    echo "should-skip=false" >> $GITHUB_OUTPUT
                  fi

    dependencies:
        runs-on: ubuntu-latest
        needs: check-skip
        if: needs.check-skip.outputs.should-skip != 'true'
        outputs:
            cache-key: ${{ steps.cache-key.outputs.key }}
        steps:
            - name: 📦 Checkout repository
              uses: actions/checkout@v6
            - name: 📦 Setup Node.js
              uses: actions/setup-node@v6
              with:
                  node-version: "22"
            - name: 📦 Setup pnpm
              uses: pnpm/action-setup@v6
            - name: 📦 Generate cache key
              id: cache-key
              run: echo "key=${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}" >> $GITHUB_OUTPUT
            - name: 📦 Cache dependencies
              uses: actions/cache@v5
              with:
                  path: |
                      ~/.pnpm-store
                      node_modules
                  key: ${{ steps.cache-key.outputs.key }}
                  restore-keys: |
                      ${{ runner.os }}-pnpm-
            - name: 📦 Install dependencies
              run: pnpm install --frozen-lockfile

    lint:
        runs-on: ubuntu-latest
        needs: [dependencies, check-skip]
        if: needs.check-skip.outputs.should-skip != 'true'
        steps:
            - uses: actions/checkout@v6
            - uses: actions/setup-node@v6
              with:
                  node-version: "22"
            - uses: pnpm/action-setup@v6
            - name: 📦 Restore dependencies cache
              uses: actions/cache@v5
              with:
                  path: |
                      ~/.pnpm-store
                      node_modules
                  key: ${{ needs.dependencies.outputs.cache-key }}
            - name: 🔍 Lint + format check
              run: pnpm run check

    typecheck:
        runs-on: ubuntu-latest
        needs: [dependencies, check-skip]
        if: needs.check-skip.outputs.should-skip != 'true'
        steps:
            - uses: actions/checkout@v6
            - uses: actions/setup-node@v6
              with:
                  node-version: "22"
            - uses: pnpm/action-setup@v6
            - name: 📦 Restore dependencies cache
              uses: actions/cache@v5
              with:
                  path: |
                      ~/.pnpm-store
                      node_modules
                  key: ${{ needs.dependencies.outputs.cache-key }}
            - name: 🔍 Type check
              run: pnpm typecheck

    knip:
        runs-on: ubuntu-latest
        needs: [dependencies, check-skip]
        if: needs.check-skip.outputs.should-skip != 'true'
        steps:
            - uses: actions/checkout@v6
            - uses: actions/setup-node@v6
              with:
                  node-version: "22"
            - uses: pnpm/action-setup@v6
            - name: 📦 Restore dependencies cache
              uses: actions/cache@v5
              with:
                  path: |
                      ~/.pnpm-store
                      node_modules
                  key: ${{ needs.dependencies.outputs.cache-key }}
            - name: 🔍 Knip
              run: pnpm knip

    commitlint:
        runs-on: ubuntu-latest
        needs: [dependencies, check-skip]
        if: needs.check-skip.outputs.should-skip != 'true' && github.event_name == 'pull_request' && github.actor != 'dependabot[bot]'
        steps:
            - uses: actions/checkout@v6
              with:
                  fetch-depth: 0
            - uses: actions/setup-node@v6
              with:
                  node-version: "22"
            - uses: pnpm/action-setup@v6
            - name: 📦 Restore dependencies cache
              uses: actions/cache@v5
              with:
                  path: |
                      ~/.pnpm-store
                      node_modules
                  key: ${{ needs.dependencies.outputs.cache-key }}
            - name: 📝 Validate commit messages
              run: npx commitlint --from ${{ github.event.pull_request.base.sha }} --to ${{ github.event.pull_request.head.sha }} --verbose

    test:
        runs-on: ubuntu-latest
        needs: [dependencies, check-skip]
        if: needs.check-skip.outputs.should-skip != 'true'
        strategy:
            fail-fast: false
            matrix:
                node-version: ['22', '24']
        steps:
            - uses: actions/checkout@v6
            - uses: pnpm/action-setup@v6
            - uses: actions/setup-node@v6
              with:
                  node-version: ${{ matrix.node-version }}
                  cache: 'pnpm'
            - name: 📦 Install dependencies
              run: pnpm install --frozen-lockfile
            - name: 🧪 Run tests
              run: pnpm test --run

    build:
        runs-on: ubuntu-latest
        needs: [dependencies, check-skip]
        if: needs.check-skip.outputs.should-skip != 'true'
        steps:
            - uses: actions/checkout@v6
            - uses: actions/setup-node@v6
              with:
                  node-version: "22"
            - uses: pnpm/action-setup@v6
            - name: 📦 Restore dependencies cache
              uses: actions/cache@v5
              with:
                  path: |
                      ~/.pnpm-store
                      node_modules
                  key: ${{ needs.dependencies.outputs.cache-key }}
            - name: 🏗️ Build project
              run: pnpm build-prod
            - name: 📦 Upload build artifacts
              uses: actions/upload-artifact@v7
              with:
                  name: build-artifacts
                  path: |
                      dist/
                      package.json
                      README.md
                  retention-days: 7

    storybook:
        runs-on: ubuntu-latest
        needs: [dependencies, check-skip]
        if: needs.check-skip.outputs.should-skip != 'true'
        steps:
            - uses: actions/checkout@v6
            - uses: actions/setup-node@v6
              with:
                  node-version: "22"
            - uses: pnpm/action-setup@v6
            - name: 📦 Restore dependencies cache
              uses: actions/cache@v5
              with:
                  path: |
                      ~/.pnpm-store
                      node_modules
                  key: ${{ needs.dependencies.outputs.cache-key }}
            - name: 📖 Build Storybook
              run: pnpm build-storybook --quiet

    bundle-size:
        runs-on: ubuntu-latest
        needs: [dependencies, check-skip]
        if: needs.check-skip.outputs.should-skip != 'true'
        steps:
            - uses: actions/checkout@v6
            - uses: actions/setup-node@v6
              with:
                  node-version: "22"
            - uses: pnpm/action-setup@v6
            - name: 📦 Restore dependencies cache
              uses: actions/cache@v5
              with:
                  path: |
                      ~/.pnpm-store
                      node_modules
                  key: ${{ needs.dependencies.outputs.cache-key }}
            - name: 🏗️ Build project
              run: pnpm build-prod
            - name: 📏 Check bundle size
              run: pnpm bundle-size

    release:
        runs-on: ubuntu-latest
        needs: [dependencies, lint, typecheck, knip, test, build, storybook, bundle-size, check-skip]
        if: needs.check-skip.outputs.should-skip != 'true' && github.ref == 'refs/heads/main' && github.event_name == 'push'
        steps:
            - name: 📦 Checkout repository
              uses: actions/checkout@v6
              with:
                  fetch-depth: 0
                  token: ${{ secrets.RELEASE_TOKEN || secrets.GITHUB_TOKEN }}
            - name: 📦 Setup Node.js
              uses: actions/setup-node@v6
              with:
                  node-version: "22"
                  registry-url: https://registry.npmjs.org
            - name: 📦 Setup pnpm
              uses: pnpm/action-setup@v6
            - name: 📦 Restore dependencies cache
              uses: actions/cache@v5
              with:
                  path: |
                      ~/.pnpm-store
                      node_modules
                  key: ${{ needs.dependencies.outputs.cache-key }}
            - name: 🔧 Configure Git
              run: |
                  git config --global user.name "github-actions[bot]"
                  git config --global user.email "github-actions[bot]@users.noreply.github.com"
            - name: 🏗️ Build for release
              run: pnpm build-prod
            - name: 🚀 Run semantic-release
              env:
                  GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN || secrets.GITHUB_TOKEN }}
                  NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
                  NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
              run: npx semantic-release
