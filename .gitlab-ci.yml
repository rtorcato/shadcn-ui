image: node:latest

cache:
  key: $CI_COMMIT_REF_SLUG
  paths:
    - .pnpm-store
  policy: pull-push

before_script:
  - corepack enable
  - corepack prepare --activate
  - pnpm config set store-dir .pnpm-store
  - pnpm config set @scope:registry https://${CI_SERVER_HOST}/api/v4/projects/${CI_PROJECT_ID}/packages/npm/
  - pnpm config set -- //${CI_SERVER_HOST}/api/v4/projects/${CI_PROJECT_ID}/packages/npm/:_authToken ${CI_JOB_TOKEN}
  - pnpm install --frozen-lockfile

stages:
  # - lint
  # - typecheck
  - test
  - build
  - version
  # - publish

test:
  stage: test
  script:
    # - pnpm install --frozen-lockfile
    - pnpm test

build:
  stage: build
  script:
    # - pnpm install --frozen-lockfile
    - pnpm run build
  artifacts:
    paths:
      - dist/

version:
  stage: version
  script:
    - git config user.name "GitLab CI"
    - git config user.email "rtorcato@me.com"
    - pnpm changeset version
    - git add .
    - git commit -m "Version packages [skip ci]"
    - git push origin HEAD:$CI_COMMIT_REF_NAME
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

