image: node:20.11.1

stages:
  - lint
  - test
  - build
  # - comment
  # - version
  - publish

cache:
    key: $CI_COMMIT_REF_SLUG
    paths:
      - .pnpm-store
      - node_modules/
    #   policy: pull-push


before_script:
  - corepack enable
  - corepack prepare --activate
  - pnpm config set store-dir .pnpm-store
  - pnpm config set @scope:registry https://${CI_SERVER_HOST}/api/v4/projects/${CI_PROJECT_ID}/packages/npm/
  - pnpm config set -- //${CI_SERVER_HOST}/api/v4/projects/${CI_PROJECT_ID}/packages/npm/:_authToken ${CI_JOB_TOKEN}
  - pnpm install --frozen-lockfile

typecheck:
  stage: lint
  script:
    - pnpm typecheck

lint:
  stage: lint
  script:
    - pnpm lint

test:
  stage: test
  script:
    - pnpm test

# Combine lint and test into a single stage
lint_and_typecheck:
  stage: lint
  parallel: 2  # Optional: specify the number of parallel jobs
  script:
    - pnpm lint &
    - pnpm typecheck &
    - wait  # Wait for both background jobs to finish


build:
  stage: build
  script:
    - pnpm run build
  artifacts:
    paths:
      - dist/

publish:
  stage: publish
  script:
    - echo "//${CI_SERVER_HOST}/api/v4/projects/${CI_PROJECT_ID}/packages/npm/:_authToken=${CI_JOB_TOKEN}">.npmrc
    - npm publish
  environment: production
  rules: 
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

version:
  stage: version
  script:
    - git config user.name "GitLab CI"
    - git config user.email "rtorcato@me.com"
    - pnpm changeset version
    - git add .
    - git commit -m "Version packages [skip ci]"
    - git push origin HEAD:$CI_COMMIT_REF_NAME
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH


