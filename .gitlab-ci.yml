# GitLab CI/CD â€” mirrors @rtorcato/js-tooling's GitHub Actions pipeline.
# Stays on GitLab + private registry.

stages:
  - dependencies
  - lint
  - varcheck
  - test
  - build
  - release
  - maintenance

####################################################
# Shared defaults â€” every job inherits image, cache, and pnpm bootstrap.

default:
  image: node:22-alpine
  interruptible: true
  cache:
    key:
      files:
        - pnpm-lock.yaml
    paths:
      - .pnpm-store
      - node_modules/
  before_script:
    - set -e
    - corepack enable
    - corepack prepare pnpm@latest --activate

####################################################
# Pipeline rules â€” skip on [skip ci]/[ci skip], only run on tracked branches + MRs.

workflow:
  rules:
    - if: '$CI_COMMIT_MESSAGE =~ /(\[ci skip\]|\[skip ci\])/i'
      when: never
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH == "dev" || $CI_COMMIT_BRANCH == "release" || $CI_COMMIT_BRANCH == "ci-testing"'

####################################################

dependencies:
  stage: dependencies
  script:
    - pnpm install --frozen-lockfile --store-dir=.pnpm-store

####################################################

lint:
  stage: lint
  needs: [dependencies]
  script:
    - pnpm lint

typecheck:
  stage: lint
  needs: [dependencies]
  script:
    - pnpm typecheck

doctor:
  stage: lint
  needs: [dependencies]
  allow_failure: true
  script:
    - pnpm doctor

commitlint:
  stage: lint
  needs: [dependencies]
  variables:
    GIT_DEPTH: 0
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH'
  script:
    - apk add --no-cache git
    - |
      if [ -n "$CI_MERGE_REQUEST_DIFF_BASE_SHA" ]; then
        echo "Validating MR commits from $CI_MERGE_REQUEST_DIFF_BASE_SHA..HEAD"
        npx commitlint --from "$CI_MERGE_REQUEST_DIFF_BASE_SHA" --to HEAD
      else
        echo "Validating latest commit"
        git log -1 --pretty=format:"%s" | npx commitlint
      fi

####################################################

varcheck:
  stage: varcheck
  before_script: []
  script:
    - |
      echo "CI_COMMIT_BRANCH: $CI_COMMIT_BRANCH"
      echo "CI_COMMIT_TAG: $CI_COMMIT_TAG"
      echo "CI_PIPELINE_SOURCE: $CI_PIPELINE_SOURCE"
      if [ -z "$GITLAB_TOKEN" ]; then
        echo "âťŚ GITLAB_TOKEN is not set"
        exit 1
      else
        echo "âś… GITLAB_TOKEN is set"
      fi
      if [ -z "$NPM_TOKEN" ]; then
        echo "âťŚ NPM_TOKEN is not set"
        exit 1
      else
        echo "âś… NPM_TOKEN is set"
      fi

####################################################
# Run vitest across the Node major matrix.
# The Node 22 variant emits coverage; GitLab parses the % from the istanbul text reporter.

test:
  stage: test
  needs: [dependencies]
  parallel:
    matrix:
      - NODE_VERSION: ["22", "24"]
  image: node:${NODE_VERSION}-alpine
  coverage: '/Lines\s*:\s*(\d+(?:\.\d+)?)%/'
  script:
    - |
      if [ "$NODE_VERSION" = "22" ]; then
        pnpm coverage
      else
        pnpm test --run
      fi
  artifacts:
    when: always
    paths:
      - coverage/
    expire_in: 1 week

####################################################

build:
  stage: build
  needs: [dependencies]
  script:
    - pnpm build-prod
  artifacts:
    paths:
      - dist/
      - package.json
      - README.md
      - pnpm-lock.yaml
      - .npmrc
    expire_in: 1 week

####################################################
# Publish via semantic-release. Only on main, only after every gate passes.
# Mirrors the GitHub release job; preserves the GitLab npm registry .npmrc inject.

publish:
  stage: release
  needs:
    - job: dependencies
    - job: lint
    - job: typecheck
    - job: varcheck
    - job: test
    - job: build
      artifacts: true
    - job: commitlint
      optional: true
  # Only run when the head commit could actually produce a release.
  # `chore`, `ci`, `docs`, `style`, `test`, `build` are no-release types per
  # @rtorcato/js-tooling's release.config.mjs releaseRules â€” skip them so
  # publish doesn't churn (and doesn't go red on token issues) for nothing.
  # Web-triggered ("Run pipeline") runs always go through.
  rules:
    - if: '$CI_PIPELINE_SOURCE == "web" && $CI_COMMIT_BRANCH == "main"'
    # \A anchors to the absolute start of the message (commit subject), not
    # each line â€” without it the body of a commit can falsely match.
    - if: '$CI_COMMIT_BRANCH == "main" && $CI_COMMIT_MESSAGE =~ /\A(feat|fix|update|refactor|revert|perf)(\(.+\))?!?:/'
    # BREAKING CHANGE footer (RFC convention): newline-prefixed + colon-terminated.
    - if: '$CI_COMMIT_BRANCH == "main" && $CI_COMMIT_MESSAGE =~ /\nBREAKING[ -]CHANGE:/'
  variables:
    GIT_AUTHOR_NAME: "GitLab CI"
    GIT_AUTHOR_EMAIL: "ci@example.com"
    GIT_COMMITTER_NAME: "GitLab CI"
    GIT_COMMITTER_EMAIL: "ci@example.com"
  script:
    - apk add --no-cache git
    - git config --global user.name "GitLab CI"
    - git config --global user.email "ci@example.com"
    - pnpm install --frozen-lockfile --store-dir=.pnpm-store
    - git fetch --unshallow || true
    - git pull origin main --ff-only || true
    - rm -f .npmrc || true
    - rm -f ~/.npmrc || true
    - echo "@rtorcato/js-tooling:registry=https://gitlab.com/api/v4/projects/60598964/packages/npm/" > ~/.npmrc
    - echo "//gitlab.com/api/v4/projects/60598964/packages/npm/:_authToken=${NPM_TOKEN}" >> ~/.npmrc
    - npx semantic-release --no-ci

####################################################
# Renovate â€” GitLab equivalent of Dependabot.
# Runs only from a scheduled pipeline. Configure the schedule in
# Project â†’ Build â†’ Pipeline schedules (recommended: monthly, 1st @ 06:00 UTC).
# Required CI/CD variables:
#   RENOVATE_TOKEN  â€” GitLab personal/project access token (api, write_repository)
#   NPM_TOKEN       â€” already set; used by hostRules in renovate.json for private packages
# Optional:
#   LOG_LEVEL=debug â€” set as a job-level var while iterating
renovate:
  stage: maintenance
  image:
    name: renovate/renovate:latest
    entrypoint: [""]
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule" && $SCHEDULE_NAME == "renovate"'
    - if: '$CI_PIPELINE_SOURCE == "web" && $RUN_RENOVATE == "true"'
  needs: []
  cache: []
  before_script: []
  variables:
    RENOVATE_PLATFORM: gitlab
    RENOVATE_ENDPOINT: "https://gitlab.com/api/v4/"
    RENOVATE_AUTODISCOVER: "false"
    RENOVATE_REPOSITORIES: "$CI_PROJECT_PATH"
    LOG_LEVEL: info
  script:
    - renovate
