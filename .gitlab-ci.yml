image: node:20.11.1

stages:
  - lint
  - test
  - build
  # - comment
  - version
  - publish

cache:
    key: $CI_COMMIT_REF_SLUG
    paths:
      - .pnpm-store
      - node_modules/
    #   policy: pull-push

before_script:
  - corepack enable
  - corepack prepare --activate
  - pnpm config set store-dir .pnpm-store
  - pnpm config set @scope:registry https://${CI_SERVER_HOST}/api/v4/projects/${CI_PROJECT_ID}/packages/npm/
  - pnpm config set -- //${CI_SERVER_HOST}/api/v4/projects/${CI_PROJECT_ID}/packages/npm/:_authToken ${CI_JOB_TOKEN}
  - pnpm install --frozen-lockfile

typecheck:
  stage: lint
  script:
    - pnpm typecheck

lint:
  stage: lint
  script:
    - pnpm lint

test:
  stage: test
  script:
    - pnpm test


build:
  stage: build
  script:
    - pnpm run build
  artifacts:
    paths:
      - dist/

version:
  stage: version
  script:
    - npx changeset
    - npx changeset version --verbose || { echo "Changeset versioning failed"; exit 1; }
    - git config user.name "GitLab CI"
    - git config user.email "your-email@example.com"
    - git add .
    - git commit -m "Version packages [skip ci]"
    - git push origin HEAD:$CI_COMMIT_REF_NAME
  # rules: 
  #   - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
  only:
    - main  # Run this job only on the main branch

publish:
  stage: publish
  script:
    - echo "//${CI_SERVER_HOST}/api/v4/projects/${CI_PROJECT_ID}/packages/npm/:_authToken=${CI_JOB_TOKEN}">.npmrc
    - npm publish
  environment: production
  rules: 
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
  # only:
  #   - main  # Run this job only on the main branch



